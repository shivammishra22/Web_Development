<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display: flex;
        }
    </style>
</head>
<body>
    <div>
    <h2 id="a">This is India </h2>
    <button onclick="f1()">Change</button>
    </div>
    <hr>
    <div class="container">
        <h2 id="b">I am Shivam Mishra</h2>
        <button onclick="f2()">Change</button>
        <h2 id="c">I am Developer</h2>
        <button onclick="f3()">Change</button>
    </div>
    <hr>
    <button onclick="f()">Alert</button>
</body>
<script>
    function f(){
        alert('Hello Incapp')
    }

    function f1(){
        var p=document.getElementById('a')
        p.innerHTML="India is my Country"
        
    }
    function f2(){
        var q=document.getElementById('b')
        q.innerHTML='I am Boy'
    }
    function f3(){
        var r=document.getElementById('c')
        r.innerHTML='I am a coder'
    }
</script>
</html>
